services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: ghcr.io/frank683456/frank-news-web:latest
    container_name: frank-dashboard-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-18090}:80"
    volumes:
      - ./data:/usr/share/nginx/html/data:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    image: ghcr.io/frank683456/frank-news-updater:latest
    container_name: frank-dashboard-updater
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/data
    command: ["supercronic", "-json", "/app/crontab"]
